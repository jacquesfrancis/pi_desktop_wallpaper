# Pi Wallpaper Overlay — configuration
# Place this file alongside overlay.py
#
# font     : font name or full path to a .ttf/.otf file
#            DejaVuSans is always available on Raspberry Pi OS.
#            For Arial: sudo apt install ttf-mscorefonts-installer
#
# size     : font point size (integer)
#
# colour   : text colour — any PIL name (white, yellow, cyan) or hex (#FFFF00)
#
# location : text position. Valid values:
#              top left      top centre      top right
#              mid left      centre centre   mid right
#              bottom left   bottom centre   bottom right
#
# wallpaper : (optional) full path to an image file to use as the desktop
#             background. Set this when the Pi has an image desktop and
#             auto-detection cannot find the PCManFM config.
#             Leave blank to use auto-detection.
#             Example: wallpaper=/usr/share/rpd-wallpaper/fisherman.png
#
# bg_colour : (optional) solid background colour for Pis with no desktop image.
#             Set this when the Pi uses a plain colour and auto-detection fails.
#             Leave blank to use auto-detection.
#             Example: bg_colour=#2090E0
#
# Auto-detection reads the PCManFM desktop config automatically.
# 'wallpaper' and 'bg_colour' are only needed as a fallback if that fails.
# 'wallpaper' takes priority over 'bg_colour' if both are set.

font=DejaVuSans
size=28
colour=white
location=bottom left
wallpaper=
bg_colour=
